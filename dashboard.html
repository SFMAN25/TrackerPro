<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans hidden" id="main-body">

    <nav class="bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold text-blue-400">Tracker Pro Dashboard</h1>
        <button id="logoutBtn" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded transition text-sm font-bold">تسجيل خروج</button>
    </nav>

    <div class="container mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-800 p-6 rounded-lg border-r-4 border-green-500 shadow-lg">
                <p class="text-gray-400 text-sm mb-1">واتساب</p>
                <h3 class="text-xl font-bold text-green-400">نشط</h3>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg border-r-4 border-blue-500 shadow-lg">
                <p class="text-gray-400 text-sm mb-1">فيسبوك</p>
                <h3 class="text-xl font-bold text-blue-400">مراقبة</h3>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg border-r-4 border-purple-500 shadow-lg">
                <p class="text-gray-400 text-sm mb-1">إجمالي السجلات</p>
                <h3 id="total-logs" class="text-xl font-bold">0</h3>
            </div>
        </div>

        <div class="bg-gray-800 rounded-lg shadow-xl overflow-hidden border border-gray-700">
            <div class="p-4 border-b border-gray-700 bg-gray-800">
                <h2 class="text-lg font-semibold text-blue-300">سجل النشاط الحي</h2>
            </div>
            <table class="w-full text-right">
                <thead class="bg-gray-700 text-gray-300">
                    <tr>
                        <th class="p-4">المنصة</th>
                        <th class="p-4">الحساب / الهدف</th>
                        <th class="p-4">النشاط</th>
                        <th class="p-4">الوقت</th>
                    </tr>
                </thead>
                <tbody id="logs-table-body" class="divide-y divide-gray-700">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
