<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(rgba(17, 24, 39, 0.8), rgba(17, 24, 39, 0.9)), 
                        url('https://files.catbox.moe/wue92s.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .glass { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-gray-100 hidden" id="main-body">

    <nav class="glass p-4 border-b border-gray-700 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold text-blue-400 tracking-tighter">TRACKER CONTROL PANEL</h1>
        <button id="logoutBtn" class="bg-red-500/20 hover:bg-red-600 text-red-500 hover:text-white px-4 py-2 rounded-lg text-xs font-bold transition">خروج</button>
    </nav>

    <div class="container mx-auto p-4 md:p-8">
        
        <div class="glass p-6 rounded-2xl border border-blue-500/20 mb-8">
            <h2 class="text-lg font-bold mb-4 text-blue-300">إضافة هدف مراقبة جديد</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <select id="platform-select" class="bg-gray-800 border border-gray-700 p-3 rounded-lg outline-none">
                    <option value="WhatsApp">WhatsApp</option>
                    <option value="Facebook">Facebook</option>
                    <option value="TikTok">TikTok</option>
                    <option value="Instagram">Instagram</option>
                </select>
                <input type="text" id="target-name" placeholder="اسم الشخص / الهدف" class="bg-gray-800 border border-gray-700 p-3 rounded-lg outline-none">
                <input type="text" id="target-link" placeholder="رابط البروفايل أو الرقم" class="bg-gray-800 border border-gray-700 p-3 rounded-lg outline-none md:col-span-1" dir="ltr">
                <button id="addLogBtn" class="bg-blue-600 hover:bg-blue-700 font-bold p-3 rounded-lg transition transform active:scale-95">بدء المراقبة</button>
            </div>
        </div>

        <div class="glass rounded-2xl border border-gray-700 overflow-hidden shadow-2xl">
            <div class="p-4 border-b border-gray-700 bg-white/5 flex justify-between items-center">
                <h2 class="font-bold">سجل النشاط المباشر</h2>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span id="total-logs" class="text-sm text-gray-400">0 سجل</span>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-black/30 text-gray-400 text-xs uppercase">
                        <tr>
                            <th class="p-4">المنصة</th>
                            <th class="p-4">الهدف</th>
                            <th class="p-4">الحالة</th>
                            <th class="p-4">التوقيت</th>
                        </tr>
                    </thead>
                    <tbody id="logs-table-body" class="text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
