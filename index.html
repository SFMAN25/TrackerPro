<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://files.catbox.moe/vkyqf7.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="text-white flex items-center justify-center h-screen">

    <div class="bg-gray-900/80 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-96 border border-blue-500/50">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-blue-400">Tracker Pro</h2>
            <p class="text-gray-400 text-sm mt-2">نظام الحماية والمراقبة الذكي</p>
        </div>
        
        <div class="space-y-4">
            <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:border-blue-500 transition text-left" dir="ltr">
            <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:border-blue-500 transition text-left" dir="ltr">
            <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-bold shadow-lg shadow-blue-900/20 transition transform active:scale-95">دخول النظام</button>
        </div>
        
        <p id="message" class="mt-4 text-red-400 text-sm text-center hidden"></p>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
