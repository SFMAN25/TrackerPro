<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

    <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-96 border border-blue-500">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">نظام الحماية والمراقبة</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-3 mb-4 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-400 text-left" dir="ltr">
        <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-3 mb-6 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-400 text-left" dir="ltr">
        <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold transition">تسجيل الدخول</button>
        <p id="message" class="mt-4 text-red-500 text-sm text-center hidden"></p>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
