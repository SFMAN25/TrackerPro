<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول | Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), 
                        url('https://files.catbox.moe/wue92s.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="text-white flex items-center justify-center h-screen">
    <div class="bg-black/70 backdrop-blur-lg p-8 rounded-2xl shadow-2xl w-96 border border-blue-500/30">
        <h2 class="text-3xl font-black text-center mb-6 text-blue-400 italic">TRACKER PRO</h2>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="Email" class="w-full p-3 rounded-lg bg-gray-900 border border-gray-700 text-left" dir="ltr">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 rounded-lg bg-gray-900 border border-gray-700 text-left" dir="ltr">
            <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-bold transition duration-300 shadow-lg shadow-blue-500/20">Login</button>
        </div>
        <p id="message" class="mt-4 text-red-400 text-sm text-center hidden"></p>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
